<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 일기 작성</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4">

<div class="max-w-2xl mx-auto bg-white shadow-md rounded-xl overflow-hidden border border-slate-200">
  <div class="bg-slate-800 px-8 py-6">
    <h1 class="text-2xl font-bold text-white">새 게시글 작성</h1>
    <p class="text-slate-400 text-sm mt-1">오늘의 소중한 기록을 남겨보세요.</p>
  </div>

  <form th:action="@{/diaries/write}" th:object="${diary}" method="post" class="p-8 space-y-6">

    <div>
      <label for="title" class="block text-sm font-semibold text-slate-700 mb-2">제목</label>
      <input type="text" id="title" th:field="*{title}" required
             placeholder="제목을 입력해주세요"
             class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200">
    </div>

<!--    <div>-->
<!--      <label for="writer" class="block text-sm font-semibold text-slate-700 mb-2">작성자</label>-->
<!--      <input type="text" id="writer"-->
<!--             th:field="*{writer}"-->
<!--             th:value="${name}"-->
<!--             readonly-->
<!--             class="w-full px-4 py-3 border border-slate-200 rounded-lg bg-slate-50 text-slate-500 cursor-not-allowed outline-none font-medium">-->
<!--      <p class="text-xs text-slate-400 mt-2">※ 작성자 정보는 로그인 정보로 자동 고정됩니다.</p>-->
<!--    </div>-->

    <div>
      <label for="content" class="block text-sm font-semibold text-slate-700 mb-2">내용</label>
      <textarea id="content" th:field="*{content}" required rows="10"
                placeholder="내용을 상세히 적어주세요..."
                class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200 resize-none"></textarea>
    </div>

    <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-100">
      <button type="button" onclick="history.back()"
              class="px-6 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition duration-200">
        취소
      </button>
      <button type="submit"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-sm transition duration-200">
        작성 완료
      </button>
    </div>
  </form>
</div>

</body>
</html>
