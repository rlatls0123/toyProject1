<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write Post - Simple Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

<nav class="bg-white shadow-sm mb-10">
  <div class="max-w-4xl mx-auto px-4 h-16 flex items-center">
    <a th:href="@{/board/list}" class="text-xl font-bold text-blue-600">My Board</a>
  </div>
</nav>

<main class="max-w-4xl mx-auto px-4">
  <div class="bg-white rounded-2xl shadow-sm p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">새 글 작성</h2>

    <form th:action="@{/diaries/write}" th:object="${diary}" method="post" class="space-y-6">
      <!-- 제목 입력 -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">제목</label>
        <input type="text" th:field="*{title}" placeholder="제목을 입력하세요"
               class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
               th:classappend="${#fields.hasErrors('title')} ? 'border-red-500' : 'border-gray-200'">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-red-500 text-xs mt-2"></p>
      </div>

      <!-- 내용 입력 -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">내용</label>
        <textarea th:field="*{content}" rows="12" placeholder="내용을 입력하세요"
                  class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition resize-none"
                  th:classappend="${#fields.hasErrors('content')} ? 'border-red-500' : 'border-gray-200'"></textarea>
        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-red-500 text-xs mt-2"></p>
      </div>

      <!-- 버튼 그룹 -->
      <div class="flex justify-end space-x-3 pt-4">
        <a th:href="@{/diaries}" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium transition">취소</a>
        <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition">
          등록하기
        </button>
      </div>
    </form>
  </div>
</main>

</body>
</html>
