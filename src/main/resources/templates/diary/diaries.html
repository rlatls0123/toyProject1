<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<div class="board-container">
  <h1>게시판</h1>
  <button class="my-button" th:onclick="|location.href='@{/diaries/write}'|" type="button">글쓰기</button>
  <form th:action="@{/logout}" method="post">  <button class="my-button" type="submit">로그아웃</button></form>

  <table class="board-table">
    <thead>
    <tr>
      <th>번호</th>
      <th>제목</th>
      <th>작성자</th>
      <th>작성일</th>
      <th>조회수</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each=" diary : ${diaryList}">
      <td th:text="${diary.id}">1</td>
      <td><a th:href="@{/diaries/{diaryId}(diaryId=${diary.id})}" th:text="${diary.title}">게시글 제목</a></td>
      <td th:text="${diary.member.name}">***</td>
      <td th:text="${#temporals.format(diary.localDateTime,'yyyy-MM-dd HH:mm')}">2026-03-14</td>
<!--      <td th:text="${diary.localDateTime}">00</td>-->
      <td>100</td>
    </tr>

    <!-- 더 많은 게시글 추가 -->
    </tbody>
  </table>
<!--  <div class="pagination">-->
<!--    <a href="#">이전</a>-->
<!--    <a href="#">1</a>-->
<!--    <a href="#">2</a>-->
<!--    <a href="#">3</a>-->
<!--    <a href="#">다음</a>-->
<!--  </div>-->

  <div class="pagination">
    <a th:if="${!diaryList.first}" th:href="@{/diaries(page=${diaryList.number - 1})}"  href="#">이전</a>
    <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
            <a th:href="@{/diaries(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${i == diaryList .number} ? 'current' : ''"></a>
        </span>
    <a th:if="${!diaryList.last}" th:href="@{/diaries(page=${diaryList.number + 1})}">다음</a>

  </div>
</div>
</body>
</html>
