<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Post - Simple Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

<nav class="bg-white shadow-sm mb-10">
  <div class="max-w-4xl mx-auto px-4 h-16 flex items-center">
    <a th:href="@{/diaries}" class="text-xl font-bold text-blue-600">My Board</a>
  </div>
</nav>

<main class="max-w-4xl mx-auto px-4">
  <article class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <!-- 제목 영역 -->
    <header class="p-8 border-b border-gray-100">
      <h1 class="text-3xl font-bold text-gray-800 mb-4" th:text="${diary.title}">게시글 제목입니다.</h1>
      <div class="flex items-center text-sm text-gray-500 space-x-4">
        <span class="font-medium text-gray-700" th:text="${diary.member.name}">작성자 이름</span>
        <span>•</span>
        <span th:text="${#temporals.format(diary.localDateTime, 'yyyy-MM-dd HH:mm')}">2024-05-04 12:00</span>
      </div>
    </header>

    <!-- 본문 영역 -->
    <section class="p-8 min-h-[300px] text-gray-700 leading-relaxed whitespace-pre-wrap" th:text="${diary.content}">
      여기에 게시글 본문 내용이 출력됩니다.
    </section>

    <!-- 하단 버튼 영역 -->
    <footer class="p-8 bg-gray-50 flex justify-between items-center">
      <a th:href="@{/diaries}" class="px-5 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-white transition">목록으로</a>

      <div class="space-x-2">
        <!-- 본인 글일 경우만 노출하도록 처리 가능 SpringSecurity -->
        <a th:href="@{/diaries/{id}/edit(id=${diary.id})}" class="px-5 py-2 text-blue-600 border border-blue-600 rounded-lg hover:bg-blue-50 transition">수정</a>
        <form th:action="@{/diaries/delete/{id}(id=${diary.id})}" method="post" class="inline">
          <button type="submit" class="px-5 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
                  onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
        </form>
      </div>
    </footer>
  </article>
</main>

</body>
</html>
