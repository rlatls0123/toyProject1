<div sec:authorize="isAuthenticated()" class="space-y-4" xmlns:th="http://www.w3.org/1999/xhtml"
     xmlns:sec="http://www.w3.org/1999/xhtml">
  <h1 class="text-3xl font-bold mb-2 text-yellow-300">
    반갑습니다, <span th:text="${member.name}">사용자</span>님!
  </h1>
  <p class="text-indigo-100 mb-6 text-sm">성공적으로 로그인되었습니다. 아래 메뉴를 이용해 보세요.</p>

  <a th:href="@{/main}" class="flex items-center justify-center w-full py-3.5 bg-white text-indigo-600 font-bold rounded-xl hover:bg-indigo-50 transition-all shadow-lg group">
    <span>메인 대시보드로 이동</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
    </svg>
  </a>

  <form th:action="@{/logout}" method="post">
    <button type="submit" class="w-full py-3 bg-transparent border border-white/40 text-white font-medium rounded-xl hover:bg-white/10 transition-all text-sm">
      로그아웃 하기
    </button>
  </form>
</div>
