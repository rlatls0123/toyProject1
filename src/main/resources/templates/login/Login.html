<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>

<h2>로그인</h2>

<form th:action="@{/login}" th:object="${LoginForm}" method="post">

    <div>
        아이디:
        <input type="text" th:field="*{id}" name="username" />
        <div style="color:red"
             th:if="${#fields.hasErrors('id')}"
             th:errors="*{id}"></div>
    </div>

    <div>
        비밀번호:
        <input type="password" th:field="*{password}" name="password" />
        <div style="color:red"
             th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
    </div>

    <br>
    <button type="submit">로그인</button>

</form>

</body>
</html>
