<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simple Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">로그인</h1>
        <p class="text-gray-500 text-sm">서비스 이용을 위해 로그인 해주세요.</p>
    </div>

    <!-- 폼 시작 (object 지정 필요) -->
    <form th:action="@{/login}" th:object="${LoginForm}" method="post" class="space-y-4">

        <!-- 글로벌 에러 (ID/PW 불일치 등) 표시 영역 -->
        <div th:if="${#fields.hasGlobalErrors()}" class="p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
            <input type="text" th:field="*{loginId}"
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                   th:classappend="${#fields.hasErrors('loginId')} ? 'border-red-500' : 'border-gray-300'">
            <!-- 필드별 에러 메시지 -->
            <p th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
            <input type="password" th:field="*{loginPassword}"
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                   th:classappend="${#fields.hasErrors('loginPassword')} ? 'border-red-500' : 'border-gray-300'">
            <p th:if="${#fields.hasErrors('loginPassword')}" th:errors="*{loginPassword}" class="text-red-500 text-xs mt-1"></p>
        </div>

        <button type="submit"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-200">
            로그인하기
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
        계정이 없으신가요? <a th:href="@{/signup}" class="text-blue-600 hover:underline">회원가입</a>
    </div>
</div>

</body>
</html>
