<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>toyProject</title>
    <style>
        .my-button {
          padding: 10px 20px;
          font-size: 16px;
          background-color: #4CAF50;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        }

        .my-button:hover {
          background-color: #45a049;
        }
    </style>
</head>
<body>

<button class="my-button" th:onclick="|location.href='@{/login}'|" type="button">로그인</button>
<button class="my-button" th:onclick="|location.href='@{/add}'|" type="button">회원가입</button>

</body>
</html>
