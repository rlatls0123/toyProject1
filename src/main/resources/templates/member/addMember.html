<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Simple Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-10">

<div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-800">회원가입</h1>
    <p class="text-gray-500 text-sm">새로운 계정을 만들어보세요.</p>
  </div>

  <!-- th:object="member" 연결 -->
  <form th:action="@{/add}" th:object="${member}" method="post" class="space-y-4">

    <!-- 아이디 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
      <input type="text" th:field="*{loginId}" placeholder="아이디 입력"
             class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
             th:classappend="${#fields.hasErrors('loginId')} ? 'border-red-500' : 'border-gray-300'">
      <p th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" class="text-red-500 text-xs mt-1"></p>
    </div>

    <!-- 이름 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
      <input type="text" th:field="*{name}" placeholder="실명 입력"
             class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
             th:classappend="${#fields.hasErrors('name')} ? 'border-red-500' : 'border-gray-300'">
      <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs mt-1"></p>
    </div>

    <!-- 나이 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">나이</label>
      <input type="number" th:field="*{age}" placeholder="나이 입력"
             class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
             th:classappend="${#fields.hasErrors('age')} ? 'border-red-500' : 'border-gray-300'">
      <p th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="text-red-500 text-xs mt-1"></p>
    </div>

    <!-- 비밀번호 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
      <input type="password" th:field="*{password}" placeholder="비밀번호 입력"
             class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
             th:classappend="${#fields.hasErrors('password')} ? 'border-red-500' : 'border-gray-300'">
      <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs mt-1"></p>
    </div>

    <button type="submit"
            class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-200 mt-2">
      가입 완료
    </button>
  </form>

  <div class="mt-6 text-center text-sm text-gray-500">
    이미 계정이 있으신가요? <a th:href="@{/login}" class="text-blue-600 hover:underline">로그인</a>
  </div>
</div>

</body>
</html>
